name: release

# Semver tags drive releases. The release process is:
#   1. bump the workspace version in Cargo.toml to X.Y.Z
#   2. commit, then `git tag vX.Y.Z && git push --tags`
# The `guard` job enforces that the tag matches the crate version.
on:
  push:
    tags: ["v*.*.*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  guard:
    name: verify tag matches crate version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check version
        run: |
          crate="$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name=="okftool-cli") | .version')"
          tag="${GITHUB_REF_NAME#v}"
          echo "crate=$crate tag=$tag"
          if [ "$crate" != "$tag" ]; then
            echo "::error::tag v$tag does not match crate version $crate — bump Cargo.toml first" >&2
            exit 1
          fi

  binaries:
    name: ${{ matrix.target }}
    needs: guard
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build, archive, checksum, and upload to the release
        uses: taiki-e/upload-rust-binary-action@v1
        with:
          bin: okftool
          target: ${{ matrix.target }}
          archive: okftool-$tag-$target
          checksum: sha256
          tar: unix
          zip: windows
          token: ${{ secrets.GITHUB_TOKEN }}

  bundle:
    name: docs OKF bundle artifact
    # Runs after `binaries` so the GitHub Release already exists.
    needs: [guard, binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Package docs/okf and upload to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cargo run -q -p okftool-cli -- build docs/okf -o "okftool-${VERSION}.tar.gz"
          gh release upload "${GITHUB_REF_NAME}" "okftool-${VERSION}.tar.gz" --clobber

  npm:
    name: publish wasm package
    needs: guard
    # Opt in by setting the repo variable PUBLISH_NPM=true and the NPM_TOKEN secret.
    if: ${{ vars.PUBLISH_NPM == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: jetli/wasm-pack-action@v0.4.0
      - run: wasm-pack build crates/okftool-wasm --target bundler --out-name okftool --out-dir pkg
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Publish
        run: |
          cd pkg
          npm pkg set name="okftool"
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
